{% extends "base.html" %}
{% block title %}Login — MK AI{% endblock %}

{% block extra_styles %}
<style>
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-container {
        width: 100%;
        max-width: 420px;
        padding: 20px;
    }
    .logo {
        text-align: center;
        margin-bottom: 32px;
    }
    .logo-text {
        font-size: 48px;
        font-weight: 700;
        letter-spacing: -2px;
    }
    .logo-text .mk { color: #ffffff; }
    .logo-text .ai { color: #3b82f6; }
    .tagline {
        color: #6b7280;
        font-size: 12px;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-top: 4px;
    }
    .auth-card {
        background: #111111;
        border: 1px solid #1f2937;
        border-radius: 16px;
        padding: 32px;
    }
    .auth-card h2 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #f9fafb;
    }
    .auth-card p.subtitle {
        color: #6b7280;
        font-size: 14px;
        margin-bottom: 24px;
    }
    .form-group {
        margin-bottom: 16px;
    }
    .form-group label {
        display: block;
        font-size: 13px;
        color: #9ca3af;
        margin-bottom: 6px;
        font-weight: 500;
    }
    .form-group input {
        width: 100%;
        padding: 12px 14px;
        background: #1a1a1a;
        border: 1px solid #2d2d2d;
        border-radius: 10px;
        color: #f9fafb;
        font-size: 14px;
        font-family: 'Inter', sans-serif;
        outline: none;
        transition: border-color 0.2s;
    }
    .form-group input:focus {
        border-color: #3b82f6;
    }
    .btn-primary {
        width: 100%;
        padding: 12px;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
        font-family: 'Inter', sans-serif;
        transition: background 0.2s;
    }
    .btn-primary:hover { background: #2563eb; }
    .error-msg {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #f87171;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 16px;
    }
    .auth-link {
        text-align: center;
        margin-top: 20px;
        font-size: 13px;
        color: #6b7280;
    }
    .auth-link a {
        color: #3b82f6;
        text-decoration: none;
        font-weight: 500;
    }
    .auth-link a:hover { text-decoration: underline; }
    .footer { position: fixed; bottom: 0; width: 100%; }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="logo">
        <div class="logo-text"><span class="mk">MK</span><span class="ai"> AI</span></div>
        <div class="tagline">Powered by Mohtashim Khan</div>
    </div>
    <div class="auth-card">
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to your MK AI account</p>
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
        </form>
        <div class="auth-link">
            Don't have an account? <a href="/register">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
